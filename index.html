<!DOCTYPE html>
<!--
  Tic Tac Toe AI - web version

  Step 1: a clean START SCREEN only. There is no real board or AI yet.
  The page has a few "screens" (sections). Only one is visible at a time;
  script.js shows/hides them when a button is clicked.

  Files:
  - styles.css  controls how the page looks
  - script.js   handles the button clicks (switching screens)
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe AI</title>
    <!-- The "?v=" forces the browser to reload the latest CSS instead of
         showing an old cached copy. Bump the number after future edits. -->
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <!-- The card sits in the middle of the page and holds every screen. -->
    <main class="card">
      <!-- ===== Start screen (visible first) ===== -->
      <section id="start-screen" class="screen">
        <h1 class="title">Tic Tac Toe AI</h1>
        <p class="subtitle">Choose a mode and challenge the computer.</p>

        <div class="button-group">
          <!-- data-target tells script.js which screen to show on click.
               data-mode tells it which kind of game to start on the board. -->
          <button class="btn" data-target="player-screen" data-mode="player">Play vs Player</button>
          <button class="btn" data-target="computer-screen">Play vs Computer</button>
          <button class="btn btn-secondary" data-target="how-screen">How to Play</button>
        </div>
      </section>

      <!-- ===== Game board (used by both Play vs Player and Easy mode) ===== -->
      <section id="player-screen" class="screen hidden">
        <!-- The title changes depending on the mode (set by script.js). -->
        <h2 id="board-title" class="title">Play vs Player</h2>

        <!-- Status line: whose turn it is, or the result. -->
        <p id="status" class="subtitle">Player X's turn</p>

        <!-- The 3x3 board. Each cell is a button so it is easy to click
             and works with the keyboard too. data-index is 0..8. -->
        <div id="board" class="board">
          <button class="cell" data-index="0"></button>
          <button class="cell" data-index="1"></button>
          <button class="cell" data-index="2"></button>
          <button class="cell" data-index="3"></button>
          <button class="cell" data-index="4"></button>
          <button class="cell" data-index="5"></button>
          <button class="cell" data-index="6"></button>
          <button class="cell" data-index="7"></button>
          <button class="cell" data-index="8"></button>
        </div>

        <div class="button-group">
          <!-- id="restart" is handled separately in script.js (not a screen
               switch), so it has no data-target. -->
          <button id="restart" class="btn">Restart</button>
          <button class="btn btn-secondary" data-target="start-screen">Back to Menu</button>
        </div>
      </section>

      <!-- ===== Difficulty menu (shown for Play vs Computer) ===== -->
      <section id="computer-screen" class="screen hidden">
        <h2 class="title">Choose Difficulty</h2>
        <p class="subtitle">You play as X. The computer plays as O.</p>

        <div class="button-group">
          <!-- Each button starts a game on the board in its computer mode. -->
          <button class="btn" data-target="player-screen" data-mode="easy">Easy</button>
          <button class="btn" data-target="player-screen" data-mode="medium">Medium</button>
          <!-- Impossible is not built yet, so it stays disabled. -->
          <button class="btn" disabled>Impossible (coming soon)</button>
          <button class="btn btn-secondary" data-target="start-screen">Back</button>
        </div>
      </section>

      <!-- ===== Placeholder: How to Play (hidden until clicked) ===== -->
      <section id="how-screen" class="screen hidden">
        <h2 class="title">How to Play</h2>
        <p class="subtitle">Take turns placing X and O.</p>
        <p class="subtitle">Get three in a row to win.</p>
        <button class="btn btn-secondary" data-target="start-screen">Back</button>
      </section>
    </main>

    <!-- "defer" makes the script run after the page has loaded.
         The "?v=" works like the CSS one: it forces a fresh copy. -->
    <script src="script.js?v=4" defer></script>
  </body>
</html>
